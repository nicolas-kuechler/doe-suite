
- name: "Clone the AWS Ansible Experiment Suite from {{ ansible_exp_suite_git_repo }}"
  ansible.builtin.git:
    repo: "{{ ansible_exp_suite_git_repo }}"
    dest: "{{ ansible_master_git_dir }}"
    accept_hostkey: yes
  become: yes
  become_method: sudo

# We cannot clone the repo directly as ansible_master_user because then
# ansible fails when it tries to create temporary files and change their permissions,
# because ansible_master_user does not have root privileges.
- name: Set permissions on cloned repo
  ansible.builtin.file:
    path: "{{ ansible_master_git_dir }}"
    owner: "{{ ansible_master_user }}"
    group: "{{ ansible_master_group }}"
    recurse: yes
  become: yes
  become_method: sudo
